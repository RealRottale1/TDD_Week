name: Run Tests

on: push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      steps:
        - uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.11"

        - name: Install dependencies
          run: pip install pytest pytest-cov

        - name: Run tests
          run: pytest --cov --cov-fail-under=85